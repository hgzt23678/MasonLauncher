name: Build Electron

on:
  push:
    branches:
      - master
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x64
            artifact: mason-launcher-linux-x64
          - runner: ubuntu-24.04-arm
            arch: arm64
            artifact: mason-launcher-linux-arm64
          - runner: windows-latest
            arch: x64
            artifact: mason-launcher-windows-x64
          - runner: windows-11-arm
            arch: arm64
            artifact: mason-launcher-windows-arm64
          - runner: macos-15-intel
            arch: x64
            artifact: mason-launcher-macos-x64-unsigned
          - runner: macos-15
            arch: arm64
            artifact: mason-launcher-macos-arm64-unsigned

    env:
      MASON_BUILD_CONFIGURATION: release

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes rpm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Check
        run: npm run check

      - name: Build distributables
        run: npx electron-forge make -a ${{ matrix.arch }}
        env:
          NODE_ENV: production

      - name: Verify distributables
        shell: node {0}
        run: |
          const { readdirSync, statSync } = require('node:fs');
          const { join } = require('node:path');
          const root = join(process.cwd(), 'out', 'release', 'make');
          const files = [];
          const visit = (directory) => {
            for (const entry of readdirSync(directory)) {
              const target = join(directory, entry);
              if (statSync(target).isDirectory()) visit(target);
              else files.push(target);
            }
          };
          visit(root);
          if (files.length === 0) {
            throw new Error(`No distributables were generated under ${root}`);
          }
          console.log(files.join('\n'));

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: out/release/make/**/*
          if-no-files-found: error
          retention-days: 14
