name: Build Electron

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x64
            artifact: mason-launcher-linux-x64
          - runner: ubuntu-24.04-arm
            arch: arm64
            artifact: mason-launcher-linux-arm64
          - runner: windows-latest
            arch: x64
            artifact: mason-launcher-windows-x64
          - runner: windows-11-arm
            arch: arm64
            artifact: mason-launcher-windows-arm64

    env:
      MASON_BUILD_CONFIGURATION: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes rpm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Check
        run: npm run check

      - name: Build distributables
        run: npx electron-forge make -a ${{ matrix.arch }}
        env:
          NODE_ENV: production

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/release/make/**/*
          if-no-files-found: error
          retention-days: 14
